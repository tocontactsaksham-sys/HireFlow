services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hireflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: .
    ports: ["8080:8080"]
    depends_on:
      - postgres
      - redis